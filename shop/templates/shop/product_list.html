<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Каталог</title>
</head>
<body>
  <h1>Каталог</h1>

  {% if products %}
    <ul>
      {% for product in products %}
        <li>
          <strong>{{ product.name }}</strong> — {{ product.price }} ₽
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>Товаров пока нет.</p>
  {% endif %}
</body>
</html>
